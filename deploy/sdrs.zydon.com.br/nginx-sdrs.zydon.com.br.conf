server {
    listen 80;
    server_name sdrs.zydon.com.br;

    # Se usar certbot, ele vai trocar/adicionar o bloco 443 automaticamente.
    # Enquanto não tiver TLS, redireciona para HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sdrs.zydon.com.br;

    # Ajustar para o certificado do host, Cloudflare Origin Cert ou certbot.
    ssl_certificate     /etc/letsencrypt/live/sdrs.zydon.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sdrs.zydon.com.br/privkey.pem;

    client_max_body_size 25m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:8791;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
